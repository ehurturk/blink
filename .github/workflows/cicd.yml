name: cicd

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js environment
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

  bundle:
    # The Expo build equivalent of the old web "build" job: exports the JS
    # bundle for both platforms, which fails the run on any broken import or
    # unresolved module. Native binaries are produced separately via EAS Build.
    needs: [typecheck]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js environment
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Export bundle (iOS + Android)
        run: npx expo export --platform all --output-dir dist
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
# Continuous deployment to the app stores is handled by EAS Build + EAS Submit
# (Expo's cloud build service), not from this workflow. Add an EXPO_TOKEN secret
# and an `eas build`/`eas submit` job here once the EAS project is set up.
